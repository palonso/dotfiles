# remap prefix from 'C-b' to 'C-q'
# Others prefer 'C-a' but I like the default bash keymap
# to go to the beggining of the line
unbind C-b
set-option -g prefix C-q
bind-key C-q send-prefix

# split panes using | and -
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

# set vim motions
setw -g mode-keys vi

# switch panes using Alt-arrow without prefix
bind h select-pane -L
bind l select-pane -R
bind k select-pane -U
bind j select-pane -D

# reload config file (change file location to your the tmux.conf you want to use)
bind r source-file ~/.config/tmux/tmux.conf

# enable mouse mode (tmux 2.1 and above)
set -g mouse on

set -g default-terminal "tmux-256color"

# bar position on top
set-option -g status-position top

# renumber windows
set-option -g renumber-windows on

# don't rename windows automatically
set-option -g allow-rename off

# start window/pane numbering at 1
set -g base-index 1
set -g pane-base-index 1

# List of plugins
set -g @plugin "catppuccin/tmux"
set -g @plugin "tmux-plugins/tpm"
set -g @plugin "tmux-plugins/tmux-sensible"
set -g @plugin "tmux-plugins/tmux-yank"
set -g @plugin "tmux-plugins/tmux-cpu"
set -g @plugin "tmux-plugins/tmux-mem"


# Configure the catppuccin plugin
set -g @catppuccin_flavor "macchiato"
set -g @catppuccin_window_status_style "rounded"

# Make the status bar transparent (inherit terminal background)
set -g @catppuccin_status_background "none"

# Load catppuccin (TPM clones the plugin into plugins/tmux/, not plugins/catppuccin/)
run ~/.config/tmux/plugins/tmux/catppuccin.tmux

# Override status style to use terminal default background (transparent)
set -g status-style "bg=default"

# Make the status line pretty and add some modules
set -g status-right-length 100
set -g status-left-length 20
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_directory}"
set -agF status-right "#{E:@catppuccin_status_cpu}"
set -ag status-right "#{E:@catppuccin_status_session}"

set -g @catppuccin_directory_text " #{s|$HOME|~|:pane_current_path}"
set -g @catppuccin_window_text " #{pane_current_command}"
set -g @catppuccin_window_current_text " #{pane_current_command}"

run ~/.config/tmux/plugins/tmux-plugins/tmux-cpu/cpu.tmux
run ~/.config/tmux/plugins/tmux-plugins/tmux-battery/battery.tmux

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.config/tmux/plugins/tpm/tpm'

# Rebuild the window-status pills with transparent sides.
#
# When @catppuccin_status_background is "none", catppuccin's built-in
# "rounded" window separators break (they emit #[fg=none,reverse] which
# is an invalid color). We bypass them and draw the pills ourselves using
# the same Powerline half-circle glyphs the right-side modules use, with
# bg=default so the terminal background shows through.
#
# Must run AFTER tpm, otherwise the plugin load will overwrite these.
set -g window-status-format "#[fg=#{E:@catppuccin_window_number_color},bg=default]#[fg=#{E:@thm_crust},bg=#{E:@catppuccin_window_number_color}]#{E:@catppuccin_window_number} #[fg=#{E:@thm_fg},bg=#{E:@catppuccin_window_text_color}]#{E:@catppuccin_window_text}#[fg=#{E:@catppuccin_window_text_color},bg=default]"
set -g window-status-current-format "#[fg=#{E:@catppuccin_window_current_number_color},bg=default]#[fg=#{E:@thm_crust},bg=#{E:@catppuccin_window_current_number_color}]#{E:@catppuccin_window_current_number} #[fg=#{E:@thm_fg},bg=#{E:@catppuccin_window_current_text_color}]#{E:@catppuccin_window_current_text}#[fg=#{E:@catppuccin_window_current_text_color},bg=default]"
